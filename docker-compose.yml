# LLM API debug proxy (puppetllm) — standalone.
#
# Stand up a fake server compatible with the Anthropic Messages API / Bedrock /
# OpenAI Chat Completions on localhost, and point ANTHROPIC_BASE_URL /
# AnthropicBedrock base_url / OPENAI_BASE_URL at it to do human-in-the-loop debugging
# without changing a single line of SDK code.
# Cost estimates / pseudo prompt-cache observation are included too. Details: README.md
#
# Start:   docker compose up -d
# Control: curl localhost:8765/_control/health ; curl localhost:8765/_control/pending | jq
# Tests:   docker compose --profile test run --rm proxy-test

name: puppetllm

services:
  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: puppetllm:latest
    container_name: puppetllm
    ports:
      - "127.0.0.1:8765:8765"   # localhost-only (do not expose the control plane externally)
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/_control/health', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: "no"

  # For running the unit tests (opt-in).
  proxy-test:
    image: puppetllm:latest
    container_name: puppetllm-test
    profiles: ["test"]
    depends_on:
      - proxy   # share the build
    working_dir: /app
    command: ["python3", "-m", "unittest",
              "puppetllm.tests.test_fake_server",
              "puppetllm.tests.test_proxy_extensions", "-v"]
    restart: "no"
